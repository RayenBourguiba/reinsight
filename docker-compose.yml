services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: reinsight
      POSTGRES_USER: reinsight
      POSTGRES_PASSWORD: reinsightpwd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  pgdata: